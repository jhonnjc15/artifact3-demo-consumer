name: Terraform dev - deploy Glue Job

on:
  workflow_dispatch:
    inputs:
      templates_repository:
        description: 'Repositorio GitHub del template'
        required: true
        default: 'jhonnjc15/artifact3-terraform-templates'
        type: string
      apply:
        description: 'Ejecutar terraform apply'
        required: true
        default: false
        type: boolean

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          path: artifact3-demo-consumer

      - name: Checkout templates repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.templates_repository }}
          path: artifact3-terraform-templates

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Create dev.auto.tfvars
        working-directory: artifact3-demo-consumer
        run: |
          cat > dev.auto.tfvars <<EOF_TFVARS
          aws_region      = "${{ secrets.AWS_REGION }}"
          artifact_bucket = "${{ secrets.ARTIFACT_BUCKET }}"
          temp_bucket     = "${{ secrets.TEMP_BUCKET }}"
          glue_role_arn   = "${{ secrets.GLUE_ROLE_ARN }}"
          lambda_role_arn = "${{ secrets.LAMBDA_ROLE_ARN }}"
          EOF_TFVARS

      - name: Show generated tfvars without sensitive values
        working-directory: artifact3-demo-consumer
        run: |
          echo "dev.auto.tfvars created"
          grep -E "aws_region|artifact_bucket|temp_bucket|glue_role_arn|lambda_role_arn" dev.auto.tfvars

      - name: Terraform init
        working-directory: artifact3-demo-consumer
        run: terraform init

      - name: Terraform plan
        working-directory: artifact3-demo-consumer
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: ${{ inputs.apply }}
        working-directory: artifact3-demo-consumer
        run: terraform apply -auto-approve tfplan