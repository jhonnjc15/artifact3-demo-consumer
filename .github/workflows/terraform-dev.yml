name: Terraform dev - deploy Glue Job

on:
  workflow_dispatch:
    inputs:
      templates_repository:
        description: 'Repositorio GitHub del template. Ejemplo: mi-org/artifact3-terraform-templates'
        required: true
        type: string
      apply:
        description: 'Ejecutar terraform apply'
        required: true
        default: false
        type: boolean

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          path: artifact3-demo-consumer

      - name: Checkout templates repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.templates_repository }}
          path: artifact3-terraform-templates

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Create dev.auto.tfvars
        working-directory: artifact3-demo-consumer
        run: |
          cat > dev.auto.tfvars <<EOF_TFVARS
          aws_region      = "${{ vars.AWS_REGION }}"
          artifact_bucket = "${{ vars.ARTIFACT_BUCKET }}"
          temp_bucket     = "${{ vars.TEMP_BUCKET }}"
          glue_role_arn   = "${{ vars.GLUE_ROLE_ARN }}"
          EOF_TFVARS

      - name: Terraform init
        working-directory: artifact3-demo-consumer
        run: terraform init

      - name: Terraform plan
        working-directory: artifact3-demo-consumer
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: ${{ inputs.apply }}
        working-directory: artifact3-demo-consumer
        run: terraform apply -auto-approve tfplan
